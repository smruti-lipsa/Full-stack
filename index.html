<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCBI Webtool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>NCBI Webtool</h1>
        <p>Quick access portal to the National Center for Biotechnology Information (NCBI).</p>
    </header>

    <main>
        <section class="search-section">
            <h2>Search NCBI Databases</h2>
            <p>Enter a gene, protein, or keyword to search across all NCBI databases directly.</p>

            <form action="https://www.ncbi.nlm.nih.gov/search/all/" method="GET" target="_blank">
                <input type="text" name="term" required>
                <button type="submit">Search NCBI</button>
            </form>
        </section>
    </main>

   

</body>

</html>
